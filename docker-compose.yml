services:
  traefik:
    image: traefik:v2.11
    container_name: traefik
    restart: always
    env_file:
      - ./config/runtime/generated/private/traefik.env
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.le.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - survey_network

  mongodb:
    image: mongo:6.0
    container_name: mongodb
    restart: always
    env_file:
      - ./config/runtime/generated/private/mongodb.env
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - survey_network

  survey-backend:
    build: ./services/survey-backend
    container_name: survey_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./config/runtime/generated/private/survey-backend.env
    depends_on:
      - mongodb
      - clinical-writer-api
    networks:
      - survey_network

  survey-frontend:
    build:
      context: .
      dockerfile: ./apps/survey-frontend/Dockerfile
    container_name: survey_frontend
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./infra/docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./config/runtime/generated/public/survey-frontend.config.json:/usr/share/nginx/html/config.json:ro
    depends_on:
      - survey-backend
    networks:
      - survey_network
    labels:
      - traefik.enable=true
      - traefik.http.routers.survey-frontend.rule=Host(`screen.lapan.cloud`)
      - traefik.http.routers.survey-frontend.entrypoints=websecure
      - traefik.http.routers.survey-frontend.tls.certresolver=le
      - traefik.http.services.survey-frontend.loadbalancer.server.port=80

  survey-patient:
    build:
      context: .
      dockerfile: ./apps/survey-patient/Dockerfile
    container_name: survey_patient
    restart: always
    ports:
      - "8081:80"
    volumes:
      - ./infra/docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./config/runtime/generated/public/survey-patient.config.json:/usr/share/nginx/html/config.json:ro
    depends_on:
      - survey-backend
    networks:
      - survey_network
    labels:
      - traefik.enable=true
      - traefik.http.routers.survey-patient.rule=Host(`patient.lapan.cloud`)
      - traefik.http.routers.survey-patient.entrypoints=websecure
      - traefik.http.routers.survey-patient.tls.certresolver=le
      - traefik.http.services.survey-patient.loadbalancer.server.port=80

  survey-builder:
    build:
      context: .
      dockerfile: ./apps/survey-builder/Dockerfile
    container_name: survey_builder
    restart: always
    ports:
      - "8083:80"
    volumes:
      - ./infra/docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./config/runtime/generated/public/survey-builder.config.json:/usr/share/nginx/html/config.json:ro
    depends_on:
      - survey-backend
    networks:
      - survey_network
    labels:
      - traefik.enable=true
      - traefik.http.routers.survey-builder.rule=Host(`builder.lapan.cloud`)
      - traefik.http.routers.survey-builder.entrypoints=websecure
      - traefik.http.routers.survey-builder.tls.certresolver=le
      - traefik.http.services.survey-builder.loadbalancer.server.port=80

  survey-worker:
    build: ./services/survey-worker
    container_name: survey_worker
    restart: always
    env_file:
      - ./config/runtime/generated/private/survey-worker.env
    depends_on:
      - mongodb
    networks:
      - survey_network

  clinical-writer-api:
    build:
      context: ./services/clinical-writer-api/clinical_writer_agent
      dockerfile: Dockerfile
    command: uvicorn clinical_writer_agent.main:app --host 0.0.0.0 --port 8000
    container_name: clinical_writer_agent
    env_file:
      - services/clinical-writer-api/clinical_writer_agent/.env
      - ./config/runtime/generated/private/clinical-writer.env
    ports:
      - "9566:8000"
    volumes:
      - ./services/clinical-writer-api/clinical_writer_agent/credentials/darv-13c19-740b161e0018.json:/app/clinical_writer_agent/credentials/darv-13c19-740b161e0018.json
    restart: unless-stopped
    networks:
      - survey_network

  clinical-narrative:
    build:
      context: .
      dockerfile: ./apps/clinical-narrative/Dockerfile
    container_name: clinical_narrative
    restart: always
    ports:
      - "8082:80"
    volumes:
      - ./infra/docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./config/runtime/generated/public/clinical-narrative.config.json:/usr/share/nginx/html/config.json:ro
    depends_on:
      - survey-backend
    networks:
      - survey_network
    labels:
      - traefik.enable=true
      - traefik.http.routers.clinical-narrative.rule=Host(`narrative.lapan.cloud`)
      - traefik.http.routers.clinical-narrative.entrypoints=websecure
      - traefik.http.routers.clinical-narrative.tls.certresolver=le
      - traefik.http.services.clinical-narrative.loadbalancer.server.port=80

volumes:
  mongodb_data:
  traefik_letsencrypt:

networks:
  survey_network:
    driver: bridge
