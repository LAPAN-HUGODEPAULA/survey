# analysis_options.yaml - Free Plan Compatible

# 1. Foundation: Include official Flutter lint rules
include: package:flutter_lints/flutter.yaml

# 2. Analyzer Configuration (Type Safety & Exclusions)
analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  
  exclude:
    - 'build/**'
    - '**/*.g.dart'
    - '**/*.freezed.dart'
    - '**/*.gr.dart'
    - '**/*.config.dart'
    - 'lib/generated_plugin_registrant.dart'
  
  errors:
    avoid_print: error
    missing_required_param: error
    prefer_const_constructors: warning
    prefer_const_literals_to_create_immutables: warning

# 3. Linter Rules (Standard Dart/Flutter lints)
linter:
  rules:
    require_trailing_commas: true
    avoid_positional_boolean_parameters: false
    prefer_single_quotes: true
    unawaited_futures: true
    always_declare_return_types: true
    directives_ordering: true
    prefer_final_in_for_each: true
    prefer_final_locals: true
    sort_constructors_first: true
    unnecessary_lambdas: true
    use_super_parameters: true

# 4. DCM Configuration - FREE PLAN ONLY
